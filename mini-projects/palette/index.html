<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Gen | Playground</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="icon" type="image/png" href="../../favicon.png">
    <style>
        body { 
          min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
          background: var(--bg); color: var(--text); font-family: var(--font-sans);
          padding: 2rem;
        }
        .palette-container {
            display: flex;
            width: 100%;
            max-width: 900px;
            height: 350px;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 3rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }
        .color-slot {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .color-slot:hover { flex: 1.5; }
        .color-hex {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
            transform: translateY(10px);
            opacity: 0;
            transition: all 0.3s;
        }
        .color-slot:hover .color-hex {
            transform: translateY(0);
            opacity: 1;
        }
        .back-link {
            position: absolute;
            top: 2rem; left: 2rem;
            color: var(--muted);
            font-size: 0.85rem;
            font-family: var(--font-mono);
            text-decoration: none;
            transition: all 0.3s;
        }
        .back-link:hover { color: var(--accent); transform: translateX(-5px); }
        .section-title { margin-bottom: 2.5rem; }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-link">← Back to Portfolio</a>

    <p class="section-label">Color Generator</p>
    <h2 class="section-title">Random Palette</h2>

    <div class="palette-container" id="palette">
        <!-- Colors generated by JS -->
    </div>

    <button id="generate" class="btn btn-primary">
        <i class="fa-solid fa-rotate"></i> Generate New Palette
    </button>

    <script>
        const palette = document.getElementById('palette');
        const generateBtn = document.getElementById('generate');

        function generateColor() {
            const chars = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += chars[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function createPalette() {
            palette.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const color = generateColor();
                const slot = document.createElement('div');
                slot.className = 'color-slot';
                slot.style.backgroundColor = color;
                slot.innerHTML = `<span class="color-hex">${color}</span>`;
                
                slot.addEventListener('click', () => {
                    navigator.clipboard.writeText(color);
                    alert(`Copied ${color} to clipboard!`);
                });
                
                palette.appendChild(slot);
            }
        }

        generateBtn.addEventListener('click', createPalette);
        createPalette();
    </script>
</body>
</html>
