<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Gen | Playground</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="icon" type="image/png" href="../../favicon.png">
    <style>
        body { min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .palette-container {
            display: flex;
            width: 80%;
            height: 300px;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        .color-slot {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .color-slot:hover { flex: 1.2; }
        .color-hex {
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }
        .back-link {
            position: absolute;
            top: 2rem; left: 2rem;
            color: var(--muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-link">← Back to Portfolio</a>

    <p class="section-label">Color Generator</p>
    <h2 class="section-title">Random Palette</h2>

    <div class="palette-container" id="palette">
        <!-- Colors generated by JS -->
    </div>

    <button id="generate" class="btn btn-primary">
        <i class="fa-solid fa-rotate"></i> Generate New Palette
    </button>

    <script>
        const palette = document.getElementById('palette');
        const generateBtn = document.getElementById('generate');

        function generateColor() {
            const chars = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += chars[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function createPalette() {
            palette.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const color = generateColor();
                const slot = document.createElement('div');
                slot.className = 'color-slot';
                slot.style.backgroundColor = color;
                slot.innerHTML = `<span class="color-hex">${color}</span>`;
                
                slot.addEventListener('click', () => {
                    navigator.clipboard.writeText(color);
                    alert(`Copied ${color} to clipboard!`);
                });
                
                palette.appendChild(slot);
            }
        }

        generateBtn.addEventListener('click', createPalette);
        createPalette();
    </script>
</body>
</html>
