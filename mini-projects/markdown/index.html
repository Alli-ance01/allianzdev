<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Previewer | Playground</title>
    <link rel="stylesheet" href="../../style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { padding: 4rem 6%; min-height: 100vh; }
        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
            height: calc(100vh - 250px);
        }
        textarea, .preview {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            color: var(--text);
            font-family: var(--font-sans);
            overflow-y: auto;
        }
        textarea {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            resize: none;
            outline: none;
        }
        textarea:focus { border-color: var(--accent); }
        .preview h1, .preview h2 { color: var(--accent); margin-top: 0; }
        .back-link {
            position: absolute;
            top: 2rem; left: 2rem;
            color: var(--muted);
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .preview-container { grid-template-columns: 1fr; height: auto; }
            textarea { height: 300px; }
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-link">← Back to Portfolio</a>

    <p class="section-label">Markdown</p>
    <h2 class="section-title">Live Previewer</h2>

    <div class="preview-container">
        <textarea id="editor" placeholder="Type markdown here..."># Hello World

## Welcome to my previewer

Build things with:
- HTML
- CSS
- JavaScript

**Bold text** and *italic text*.</textarea>
        <div id="preview" class="preview"></div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');

        function updatePreview() {
            preview.innerHTML = marked.parse(editor.value);
        }

        editor.addEventListener('input', updatePreview);
        updatePreview();
    </script>
</body>
</html>
