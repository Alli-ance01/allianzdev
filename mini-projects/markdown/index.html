<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Previewer | Playground</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="icon" type="image/png" href="../../favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { 
          padding: 6rem 6% 2rem; min-height: 100vh; 
          background: var(--bg); color: var(--text); font-family: var(--font-sans);
        }
        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 3rem;
            height: calc(100vh - 280px);
        }
        textarea, .preview {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            color: var(--text);
            font-family: var(--font-sans);
            overflow-y: auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: border-color 0.3s;
        }
        textarea {
            font-family: var(--font-mono);
            font-size: 0.95rem;
            resize: none;
            outline: none;
            line-height: 1.6;
        }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-dim); }
        .preview h1, .preview h2 { color: var(--accent); margin-top: 0; margin-bottom: 1rem; }
        .preview p { margin-bottom: 1rem; color: var(--muted); }
        .preview ul { margin-bottom: 1rem; padding-left: 1.5rem; }
        .back-link {
            position: absolute;
            top: 2.5rem; left: 2.5rem;
            color: var(--muted);
            font-size: 0.85rem;
            font-family: var(--font-mono);
            text-decoration: none;
            transition: all 0.3s;
        }
        .back-link:hover { color: var(--accent); transform: translateX(-5px); }
        @media (max-width: 900px) {
            .preview-container { grid-template-columns: 1fr; height: auto; }
            textarea { height: 350px; }
            .preview { height: 350px; }
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-link">← Back to Portfolio</a>

    <p class="section-label">Markdown</p>
    <h2 class="section-title">Live Previewer</h2>

    <div class="preview-container">
        <textarea id="editor" placeholder="Type markdown here..."># Hello World

## Welcome to my previewer

Build things with:
- HTML
- CSS
- JavaScript

**Bold text** and *italic text*.</textarea>
        <div id="preview" class="preview"></div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');

        function updatePreview() {
            preview.innerHTML = marked.parse(editor.value);
        }

        editor.addEventListener('input', updatePreview);
        updatePreview();
    </script>
</body>
</html>
