<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: Lost in the Grid | Oluwatimileyin Ogundere</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            overflow: hidden;
        }
        .error-container {
            position: relative;
            z-index: 10;
            max-width: 600px;
        }
        .error-code {
            font-family: var(--font-mono);
            font-size: 8rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-dim);
            margin-bottom: 1rem;
            line-height: 1;
        }
        .error-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text);
        }
        .error-desc {
            font-size: 1.1rem;
            color: var(--muted);
            margin-bottom: 3rem;
            line-height: 1.6;
        }
        .back-home {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div id="mouse-glow"></div>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Lost in the Grid</h1>
        <p class="error-desc">
            The page you're looking for has been de-compiled or moved to another sector. 
            Let's get you back to the main node.
        </p>
        
        <div class="magnetic-wrap">
            <a href="index.html" class="btn btn-primary magnetic-item back-home">
                <i class="fa-solid fa-house"></i> Back to Home
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
